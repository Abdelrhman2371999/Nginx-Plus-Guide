global_defs {
    notification_email {
        admin@yourdomain.com
    }
    notification_email_from keepalived@nginx-master.local
    smtp_server 127.0.0.1
    smtp_connect_timeout 30
    router_id NGINX_MASTER
    vrrp_skip_check_adv_addr
    vrrp_garp_interval 0
    vrrp_gna_interval 0
}

vrrp_script check_nginx {
    script "/usr/bin/killall -0 nginx"
    interval 2
    weight 2
    fall 2
    rise 2
}

vrrp_script check_nginx_http {
    script "/usr/bin/curl -f -s -o /dev/null http://localhost/health"
    interval 3
    weight 2
    fall 2
    rise 2
}

vrrp_instance VI_1 {
    state MASTER
    interface eth0                    # ⚠️ Replace with your interface name
    virtual_router_id 51
    priority 101
    advert_int 1
    
    authentication {
        auth_type PASS
        auth_pass secure_keepalived_auth_key_2024  # ⚠️ Change this password
    }
    
    virtual_ipaddress {
        172.20.20.51/16 dev eth0 label eth0:vip
    }
    
    track_script {
        check_nginx
    }
    
    notify_master "/etc/keepalived/notify.sh master"
    notify_backup "/etc/keepalived/notify.sh backup"
    notify_fault "/etc/keepalived/notify.sh fault"
    
    preempt
    preempt_delay 30
}
